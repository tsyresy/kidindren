<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <title>Payvilus — Paiement</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;padding:20px;min-height:100vh}
        .plan-box{background:rgba(22,249,138,0.08);border:1px solid rgba(22,249,138,0.3);border-radius:14px;padding:16px;margin-bottom:20px;text-align:center}
        .plan-name{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:4px}
        .plan-price{color:#16f98a;font-size:28px;font-weight:800}
        .plan-cycle{color:rgba(255,255,255,0.4);font-size:12px;margin-top:2px}
        .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(255,255,255,0.3);font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
        #payment-request-button{margin-bottom:16px}
        #payment-element{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.1);min-height:60px}
        #submit{width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,#16f98a,#3EF0D0);color:#010F1B;font-weight:800;font-size:16px;border:none;border-radius:14px;cursor:pointer}
        #submit:disabled{opacity:0.5;cursor:not-allowed}
        #message{margin-top:14px;padding:12px;border-radius:10px;font-size:13px;text-align:center;display:none}
        #message.error{background:rgba(255,77,109,0.15);color:#ff4d6d;border:1px solid rgba(255,77,109,0.3)}
        #message.success{background:rgba(22,249,138,0.15);color:#16f98a;border:1px solid rgba(22,249,138,0.3)}
        .lock{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;color:rgba(255,255,255,0.3);font-size:11px}
        .loading{text-align:center;padding:40px;color:#16f98a;font-size:14px}
        .error-box{background:rgba(255,77,109,0.12);border:1px solid rgba(255,77,109,0.3);border-radius:12px;padding:16px;text-align:center;color:#ff4d6d;font-size:13px;margin-top:20px}
    </style>
</head>
<body>
<div id="root"><div class="loading">Chargement du formulaire...</div></div>
<script>
    // Clé publique Stripe LIVE — intégrée directement dans la page
    var STRIPE_PK = 'pk_live_51SWQ8FRiwYd4yGU054SfyNy50x67CNJtGLivnlbP8bBN1vHilvlVcmG7rNgMQEv7KkOCrfZqUomoLuWdxUfyf8RF00rwVCT744'

    // Lecture des paramètres URL
    var params       = new URLSearchParams(window.location.search)
    var clientSecret = params.get('cs')
    var planName     = params.get('plan') || 'Premium'
    var amount       = parseInt(params.get('amount') || '0', 10)

    console.log('cs:', clientSecret ? clientSecret.substring(0,20)+'...' : 'NULL')
    console.log('plan:', planName, 'amount:', amount)

    if (!clientSecret) {
        document.getElementById('root').innerHTML = '<div class="error-box">Erreur : session de paiement invalide.<br/>Veuillez relancer depuis l\'application.</div>'
    } else {
        init()
    }

    function init() {
        document.getElementById('root').innerHTML = `
        <div class="plan-box">
          <div class="plan-name">Abonnement ` + planName + `</div>
          <div class="plan-price">` + amount.toLocaleString('fr-FR') + ` MGA</div>
          <div class="plan-cycle">par mois</div>
        </div>
        <div id="payment-request-button"></div>
        <div id="divider" class="divider" style="display:none">ou payer par carte</div>
        <form id="payment-form">
          <div id="payment-element"></div>
          <button id="submit" type="submit">Payer ` + amount.toLocaleString('fr-FR') + ` MGA</button>
          <div id="message"></div>
        </form>
        <div class="lock">🔒 Paiement sécurisé par Stripe</div>
      `

        var stripe = Stripe(STRIPE_PK)
        var elements = stripe.elements({
            clientSecret: clientSecret,
            appearance: {
                theme: 'night',
                variables: {
                    colorPrimary: '#16f98a',
                    colorBackground: '#1a1a2e',
                    colorText: '#ffffff',
                    colorDanger: '#ff4d6d',
                    borderRadius: '10px'
                }
            }
        })

        // Payment Element avec wallets intégrés
        var pe = elements.create('payment', { wallets: { applePay: 'auto', googlePay: 'auto' } })
        pe.mount('#payment-element')

        // Payment Request Button (Apple Pay / Google Pay natif)
        var pr = stripe.paymentRequest({
            country: 'MG', currency: 'mga',
            total: { label: 'Payvilus ' + planName, amount: amount },
            requestPayerName: true, requestPayerEmail: true
        })
        var prBtn = elements.create('paymentRequestButton', {
            paymentRequest: pr,
            style: { paymentRequestButton: { theme: 'dark', height: '52px' } }
        })
        pr.canMakePayment().then(function(r) {
            if (r) {
                document.getElementById('payment-request-button').style.display = 'block'
                document.getElementById('divider').style.display = 'flex'
                prBtn.mount('#payment-request-button')
            }
        })
        pr.on('paymentmethod', function(ev) {
            stripe.confirmCardPayment(clientSecret, { payment_method: ev.paymentMethod.id }, { handleActions: false })
                .then(function(res) {
                    if (res.error) { ev.complete('fail'); showMsg(res.error.message, 'error') }
                    else {
                        ev.complete('success')
                        if (res.paymentIntent.status === 'requires_action') {
                            stripe.confirmCardPayment(clientSecret).then(function(r2) {
                                if (!r2.error) notifyRN(r2.paymentIntent.id)
                            })
                        } else {
                            notifyRN(res.paymentIntent.id)
                        }
                    }
                })
        })

        // Soumission formulaire carte
        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault()
            setBusy(true)
            stripe.confirmPayment({ elements: elements, redirect: 'if_required' })
                .then(function(res) {
                    if (res.error) {
                        showMsg(res.error.message || 'Une erreur est survenue', 'error')
                        setBusy(false)
                    } else if (res.paymentIntent && res.paymentIntent.status === 'succeeded') {
                        showMsg('Paiement réussi ! ✅', 'success')
                        setTimeout(function() { notifyRN(res.paymentIntent.id) }, 800)
                    }
                })
        })

        function notifyRN(piId) {
            var msg = JSON.stringify({ type: 'PAYMENT_SUCCESS', paymentIntentId: piId })
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(msg)
            } else {
                console.log('notifyRN (test):', msg)
            }
        }

        function showMsg(msg, type) {
            var el = document.getElementById('message')
            el.textContent = msg
            el.className = type
            el.style.display = 'block'
        }

        function setBusy(busy) {
            var btn = document.getElementById('submit')
            btn.disabled = busy
            btn.textContent = busy ? 'Traitement...' : 'Payer ' + amount.toLocaleString('fr-FR') + ' MGA'
        }
    }
</script>
</body>
</html>
