<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <title>Payvilus — Paiement</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;padding:20px;min-height:100vh}
        .plan-box{background:rgba(22,249,138,0.08);border:1px solid rgba(22,249,138,0.3);border-radius:14px;padding:16px;margin-bottom:20px;text-align:center}
        .plan-name{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:4px}
        .plan-price{color:#16f98a;font-size:28px;font-weight:800}
        .plan-cycle{color:rgba(255,255,255,0.4);font-size:12px;margin-top:2px}
        .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(255,255,255,0.3);font-size:12px}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
        #payment-request-button{margin-bottom:16px}
        #payment-element{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,0.1);min-height:60px}
        #submit{width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,#16f98a,#3EF0D0);color:#010F1B;font-weight:800;font-size:16px;border:none;border-radius:14px;cursor:pointer}
        #submit:disabled{opacity:0.5;cursor:not-allowed}
        #message{margin-top:14px;padding:12px;border-radius:10px;font-size:13px;text-align:center;display:none}
        #message.error{background:rgba(255,77,109,0.15);color:#ff4d6d;border:1px solid rgba(255,77,109,0.3)}
        #message.success{background:rgba(22,249,138,0.15);color:#16f98a;border:1px solid rgba(22,249,138,0.3)}
        .lock{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;color:rgba(255,255,255,0.3);font-size:11px}
        .loading{text-align:center;padding:40px;color:#16f98a}
    </style>
</head>
<body>
<div id="app">
    <div class="loading" id="loading">Chargement...</div>
</div>
<script>
    const params       = new URLSearchParams(window.location.search)
    const clientSecret = params.get('cs')
    const planName     = params.get('plan') || 'Premium'
    const amount       = parseInt(params.get('amount') || '0')
    const stripeKey    = params.get('pk')

    if (!clientSecret || !stripeKey) {
        document.getElementById('loading').textContent = 'Paramètres manquants'
    } else {
        document.getElementById('loading').style.display = 'none'
        document.getElementById('app').innerHTML = `
        <div class="plan-box">
          <div class="plan-name">Abonnement ${planName}</div>
          <div class="plan-price">${amount.toLocaleString('fr-FR')} MGA</div>
          <div class="plan-cycle">par mois</div>
        </div>
        <div id="payment-request-button"></div>
        <div class="divider" id="divider" style="display:none">ou payer par carte</div>
        <form id="payment-form">
          <div id="payment-element"></div>
          <button id="submit" type="submit">Payer ${amount.toLocaleString('fr-FR')} MGA</button>
          <div id="message"></div>
        </form>
        <div class="lock">🔒 Paiement sécurisé par Stripe</div>
      `
        const stripe   = Stripe(stripeKey)
        const elements = stripe.elements({ clientSecret, appearance: { theme:'night', variables:{ colorPrimary:'#16f98a', colorBackground:'#1a1a2e', colorText:'#ffffff', colorDanger:'#ff4d6d', borderRadius:'10px' } } })
        const paymentElement = elements.create('payment', { wallets:{ applePay:'auto', googlePay:'auto' } })
        paymentElement.mount('#payment-element')

        const pr = stripe.paymentRequest({ country:'MG', currency:'mga', total:{ label:`Payvilus ${planName}`, amount }, requestPayerName:true, requestPayerEmail:true })
        const prBtn = elements.create('paymentRequestButton', { paymentRequest:pr, style:{ paymentRequestButton:{ theme:'dark', height:'52px' } } })
        pr.canMakePayment().then(r => { if(r){ document.getElementById('payment-request-button').style.display='block'; document.getElementById('divider').style.display='flex'; prBtn.mount('#payment-request-button') } })
        pr.on('paymentmethod', async ev => {
            const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, { payment_method:ev.paymentMethod.id }, { handleActions:false })
            if(error){ ev.complete('fail'); showMsg(error.message,'error') } else { ev.complete('success'); if(paymentIntent.status==='requires_action') await stripe.confirmCardPayment(clientSecret); notifyRN(paymentIntent.id) }
        })
        document.getElementById('payment-form').addEventListener('submit', async e => {
            e.preventDefault(); setBusy(true)
            const { error, paymentIntent } = await stripe.confirmPayment({ elements, redirect:'if_required' })
            if(error){ showMsg(error.message||'Erreur','error'); setBusy(false) }
            else if(paymentIntent?.status==='succeeded'){ showMsg('Paiement réussi !','success'); setTimeout(()=>notifyRN(paymentIntent.id),800) }
        })
        function notifyRN(piId){ const msg=JSON.stringify({type:'PAYMENT_SUCCESS',paymentIntentId:piId}); if(window.ReactNativeWebView) window.ReactNativeWebView.postMessage(msg) }
        function showMsg(msg,type){ const el=document.getElementById('message'); el.textContent=msg; el.className=type; el.style.display='block' }
        function setBusy(b){ const btn=document.getElementById('submit'); btn.disabled=b; btn.textContent=b?'Traitement...':`Payer ${amount.toLocaleString('fr-FR')} MGA` }
    }
</script>
</body>
</html>
